name: Update Prompt Catalogs

on:
  schedule:
    - cron: "17 9 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-prompt-catalogs
  cancel-in-progress: false

jobs:
  update-prompts:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install project
        run: |
          python -m venv .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/python -m pip install -e '.[dev]'

      - name: Extract missing prompt catalogs
        run: |
          .venv/bin/python tools/extract_prompt_versions.py --since-existing-latest

      - name: Check patch compatibility with Docker smoke
        run: |
          tools/run_patch_smoke_docker.sh --since-existing-latest --run-smoke --smoke-timeout 60

      - name: Apply suggested prompt metadata
        run: |
          mkdir -p tmp/prompt-metadata-candidates

          changed=0
          while IFS= read -r -d '' path; do
            changed=1
            version="$(basename "$path" .json)"
            .venv/bin/python tools/suggest_prompt_metadata.py \
              --target "$path" \
              --history-dir prompts \
              --catalog-dir vendor/tweakcc/data/prompts \
              --out "tmp/prompt-metadata-candidates/${version}.json" \
              --update-target \
              --fail-on-review-needed
          done < <(git diff --name-only -z -- 'prompts/*.json')

          if [ "$changed" -eq 0 ]; then
            echo "No changed prompt catalogs need suggested metadata."
          fi

      - name: Validate prompt and patch tooling
        run: |
          .venv/bin/python -m pytest -q \
            tests/test_prompt_version_extraction.py \
            tests/test_suggest_prompt_metadata.py \
            tests/test_patch_release_check.py

      - name: Commit prompt catalog and patch compatibility updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          while IFS= read -r -d '' path; do
            git add -- "$path"
          done < <(find prompts -maxdepth 1 -type f -name '*.json' -print0)

          if [ -d reports/patch-compat ]; then
            while IFS= read -r -d '' path; do
              git add -- "$path"
            done < <(find reports/patch-compat -maxdepth 1 -type f -name '*.json' -print0)
          fi

          if git diff --cached --quiet; then
            echo "No prompt catalog or patch compatibility changes to commit."
            exit 0
          fi

          git commit -m "Update prompt catalogs and patch reports"
          git push
