name: Release

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      repository:
        description: "Package index to publish to"
        type: choice
        required: true
        default: testpypi
        options:
          - testpypi
          - pypi

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate-version:
    name: Validate version and tag
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.project-version.outputs.version }}
      tag: ${{ steps.project-version.outputs.tag }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Read project version
        id: project-version
        shell: bash
        run: |
          version="$(
            python - <<'PY'
          import pathlib
          import re
          import tomllib

          project_version = tomllib.loads(pathlib.Path("pyproject.toml").read_text())["project"]["version"]
          version_text = pathlib.Path("ccsilo/_version.py").read_text()
          match = re.search(r'__version__\s*=\s*"([^"]+)"', version_text)
          if match is None:
              raise SystemExit("ccsilo/_version.py does not define __version__")
          runtime_version = match.group(1)
          if project_version != runtime_version:
              raise SystemExit(
                  f"pyproject.toml version {project_version} does not match ccsilo/_version.py {runtime_version}"
              )
          print(project_version)
          PY
          )"
          tag="v${version}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "Project version: ${version}"
          echo "Expected tag: ${tag}"

      - name: Validate published GitHub Release tag
        if: ${{ github.event_name == 'release' }}
        env:
          ACTUAL_TAG: ${{ github.event.release.tag_name }}
          EXPECTED_TAG: ${{ steps.project-version.outputs.tag }}
        shell: bash
        run: |
          if [ "$ACTUAL_TAG" != "$EXPECTED_TAG" ]; then
            echo "Release tag ${ACTUAL_TAG} does not match pyproject.toml version tag ${EXPECTED_TAG}" >&2
            exit 1
          fi

      - name: Validate PyPI dispatch tag
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.repository == 'pypi' }}
        env:
          EXPECTED_TAG: ${{ steps.project-version.outputs.tag }}
        shell: bash
        run: |
          if [ "$GITHUB_REF_TYPE" != "tag" ]; then
            echo "PyPI publish must be dispatched from tag ${EXPECTED_TAG}, not ${GITHUB_REF_TYPE} ${GITHUB_REF_NAME}" >&2
            exit 1
          fi
          if [ "$GITHUB_REF_NAME" != "$EXPECTED_TAG" ]; then
            echo "Dispatch tag ${GITHUB_REF_NAME} does not match pyproject.toml version tag ${EXPECTED_TAG}" >&2
            exit 1
          fi

  build:
    name: Build distributions
    runs-on: ubuntu-latest
    needs: validate-version

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'

      - name: Ruff
        run: |
          ruff check ccsilo tests tools

      - name: Pytest
        run: |
          python -m pytest -q

      - name: Build distributions
        run: |
          rm -rf dist build
          python -m build
          python -m twine check dist/*

      - name: Upload distributions
        uses: actions/upload-artifact@v7
        with:
          name: python-distributions
          path: dist/
          if-no-files-found: error

  publish-testpypi:
    name: Publish to TestPyPI
    runs-on: ubuntu-latest
    needs: build
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.repository == 'testpypi' }}
    environment: testpypi
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v7
        with:
          name: python-distributions
          path: dist/

      - name: Publish distributions to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.repository == 'pypi' }}
    environment: pypi
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v7
        with:
          name: python-distributions
          path: dist/

      - name: Publish distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - validate-version
      - publish-pypi
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.repository == 'pypi' }}
    permissions:
      contents: write

    steps:
      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.validate-version.outputs.tag }}
        shell: bash
        run: |
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release edit "$TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$TAG" \
              --latest
          else
            gh release create "$TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$TAG" \
              --generate-notes \
              --latest \
              --verify-tag
          fi
