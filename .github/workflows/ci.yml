name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      run_docker_smoke:
        description: "Run Docker patch smoke after unit tests"
        type: boolean
        default: false
      smoke_versions:
        description: "Optional space-separated Claude Code versions. Empty uses latest."
        required: false
        default: ""

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Lint and Test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install project
        run: |
          python -m venv .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/python -m pip install -e '.[dev]'
          .venv/bin/python -m pip install ruff

      - name: Ruff
        run: |
          .venv/bin/ruff check ccsilo tests tools

      - name: Pytest
        run: |
          .venv/bin/python -m pytest -q

      - name: Wheel install smoke
        run: |
          .venv/bin/python -m build
          python -m venv /tmp/ccsilo-wheel-smoke
          /tmp/ccsilo-wheel-smoke/bin/python -m pip install --upgrade pip
          /tmp/ccsilo-wheel-smoke/bin/python -m pip install dist/*.whl
          /tmp/ccsilo-wheel-smoke/bin/ccsilo --help
          /tmp/ccsilo-wheel-smoke/bin/ccsilo variant providers --json

  docker-patch-smoke:
    name: Docker Patch Smoke
    runs-on: ubuntu-latest
    needs: test
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_docker_smoke }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Run Docker patch smoke
        env:
          SMOKE_VERSIONS: ${{ inputs.smoke_versions }}
        run: |
          if [ -n "$SMOKE_VERSIONS" ]; then
            # shellcheck disable=SC2086
            tools/run_patch_smoke_docker.sh --versions $SMOKE_VERSIONS --run-smoke --smoke-timeout 60
          else
            tools/run_patch_smoke_docker.sh --latest --run-smoke --smoke-timeout 60
          fi

      - name: Upload patch reports
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: patch-compat-reports
          path: reports/patch-compat/
          if-no-files-found: ignore
